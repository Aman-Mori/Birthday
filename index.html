<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>Birthday Magic Pro 🎂</title>

<style>
body {
  margin: 0;
  background: radial-gradient(circle at bottom, #0f2027, #1c1c3c, #000);
  font-family: 'Segoe UI', sans-serif;
  text-align: center;
  color: white;
  overflow: hidden;
}

/* Heading */
h1 {
  margin-top: 40px;
  font-weight: 300;
  letter-spacing: 2px;
  opacity: 0.9;
}

/* Input */
.input-box {
  margin-top: 30px;
}
input, select, button {
  padding: 12px;
  border-radius: 8px;
  border: none;
  margin: 5px;
  font-size: 14px;
}
button {
  background: linear-gradient(45deg, #ff7e5f, #ff3d77);
  color: white;
  cursor: pointer;
  transition: 0.3s;
}
button:hover {
  transform: scale(1.05);
}

/* Scene */
#scene {
  margin-top: 100px;
  position: relative;
}

/* ===== CAKE ===== */
.cake {
  position: relative;
  width: 260px;
  margin: auto;
  animation: float 3s ease-in-out infinite;
}

@keyframes float {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}

.top {
  height: 30px;
  background: linear-gradient(#fff, #f1f1f1);
  border-radius: 50%;
  margin-bottom: -15px;
}

.layer {
  height: 55px;
  border-radius: 12px;
  background: linear-gradient(to bottom, #fff, #ddd);
  margin-top: -12px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.5);
}

/* ===== CANDLE ===== */
.candle-wrapper {
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
}

.candle {
  width: 18px;
  height: 140px;
  border-radius: 10px;
  background: linear-gradient(#f5f5f5, #ddd);
  position: relative;
}

/* Only candle glow */
.floor-glow {
  position: absolute;
  bottom: -25px;
  left: 50%;
  transform: translateX(-50%);
  width: 140px;
  height: 40px;
  background: radial-gradient(circle, rgba(255,200,100,0.3), transparent);
  border-radius: 50%;
}

/* Wick */
#knot {
  position: absolute;
  bottom: 100%;
  left: 50%;
  width: 3px;
  height: 12px;
  background: #222;
  transform: translateX(-50%);
}

/* Flame */
.flame {
  position: absolute;
  bottom: 112%;
  left: 50%;
  width: 18px;
  height: 30px;
  transform: translateX(-50%);
  background: radial-gradient(circle, #fff, #ffd700, #ff8c00);
  border-radius: 50%;
  animation: flicker 0.15s infinite alternate;
  box-shadow: 0 0 35px orange;
}

@keyframes flicker {
  from { transform: translateX(-50%) scale(1); }
  to { transform: translateX(-48%) scale(1.2); }
}

/* Glow */
.glow {
  position: absolute;
  bottom: 120%;
  left: 50%;
  width: 35px;
  height: 35px;
  transform: translateX(-50%);
  border-radius: 50%;
  box-shadow: 0 0 100px 50px rgba(255,200,100,0.25);
  animation: glow 2s infinite;
}

@keyframes glow {
  0%,100% { opacity: 0.6; }
  50% { opacity: 1; }
}

/* Smoke */
.smoke {
  position: absolute;
  width: 8px;
  height: 8px;
  background: gray;
  border-radius: 50%;
  opacity: 0;
}
.smoke.active {
  animation: smokeUp 2s forwards;
}
@keyframes smokeUp {
  to { transform: translateY(-120px) scale(3); opacity: 0; }
}

/* Message */
.message {
  display: none;
  margin-top: 20px;
  font-size: 30px;
  color: gold;
  animation: fadeIn 2s ease forwards;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px);}
  to { opacity: 1; transform: translateY(0);}
}

/* Confetti */
.confetti {
  position: fixed;
  width: 8px;
  height: 8px;
  top: 0;
  animation: fall linear forwards;
}

@keyframes fall {
  to { transform: translateY(100vh) rotate(360deg); }
}

/* Sparkles */
.sparkle {
  position: fixed;
  width: 4px;
  height: 4px;
  background: white;
  border-radius: 50%;
  animation: sparkle 2s infinite;
}

@keyframes sparkle {
  0%,100% { opacity: 0; }
  50% { opacity: 1; }
}
</style>

</head>

<body>

<h1>🎂 Make a Wish 🎉</h1>

<div class="input-box">
  <input type="text" id="name" placeholder="Enter Name">
  <select id="mode">
    <option value="cake">Cake + Candle</option>
    <option value="candle">Only Candle</option>
  </select>
  <button onclick="start()">Start</button>
</div>

<div id="scene"></div>

<div class="message" id="msg"></div>

<script>
let blown = false;

function start() {
  const name = document.getElementById("name").value.trim();
  const mode = document.getElementById("mode").value;

  if (!name) {
    alert("Enter name 😄");
    return;
  }

  document.querySelector(".input-box").style.display = "none";

  const scene = document.getElementById("scene");

  if (mode === "cake") {
    scene.innerHTML = `
      <div class="cake">
        <div class="top"></div>
        <div class="layer"></div>
        <div class="layer"></div>
        <div class="layer"></div>

        <div class="candle-wrapper" style="top:-70px;">
          <div class="candle" id="candle"></div>
        </div>
      </div>
    `;
  } else {
    scene.innerHTML = `
      <div class="candle-wrapper" style="top:0;">
        <div class="candle" id="candle"></div>
        <div class="floor-glow"></div>
      </div>
    `;
  }

  createFlame();

  document.getElementById("msg").innerText = "🎉 Happy Birthday " + name;

  startMic();
  createSparkles();
}

function createFlame() {
  const candle = document.getElementById("candle");

  candle.innerHTML = `
    <div id="knot"></div>
    <div class="flame"></div>
    <div class="glow"></div>
    <div class="smoke"></div>
    <div class="smoke"></div>
    <div class="smoke"></div>
  `;
}

function startMic() {
navigator.mediaDevices.getUserMedia({ audio: true })
.then(stream => {

  const ctx = new AudioContext();
  const mic = ctx.createMediaStreamSource(stream);
  const analyser = ctx.createAnalyser();

  mic.connect(analyser);
  analyser.fftSize = 256;

  const data = new Uint8Array(analyser.frequencyBinCount);

  function detect() {
    analyser.getByteFrequencyData(data);
    let vol = data.reduce((a,b)=>a+b)/data.length;

    if (vol > 60 && !blown) {
      blown = true;

      document.querySelector(".flame").style.display = "none";
      document.querySelector(".glow").style.display = "none";

      document.querySelectorAll(".smoke").forEach(s => s.classList.add("active"));

      document.getElementById("msg").style.display = "block";

      confetti();
    }

    requestAnimationFrame(detect);
  }

  detect();
})
.catch(()=>alert("Mic allow karo!"));
}

function confetti() {
  for (let i = 0; i < 150; i++) {
    let c = document.createElement("div");
    c.className = "confetti";
    c.style.left = Math.random()*100+"vw";
    c.style.background = ["#ff7675","#74b9ff","#55efc4","#ffeaa7","#fd79a8"][Math.floor(Math.random()*5)];
    c.style.animationDuration = (Math.random()*3+2)+"s";
    document.body.appendChild(c);
  }
}

function createSparkles() {
  for (let i = 0; i < 60; i++) {
    let s = document.createElement("div");
    s.className = "sparkle";
    s.style.left = Math.random()*100+"vw";
    s.style.top = Math.random()*100+"vh";
    s.style.animationDelay = Math.random()*2+"s";
    document.body.appendChild(s);
  }
}
</script>

</body>
</html>
