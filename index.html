<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Blow Candle 🎂</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    text-align: center;
    background: linear-gradient(135deg, #141e30, #243b55);
    color: white;
}

/* Top UI */
.controls {
    margin-top: 40px;
}

input, select, button {
    padding: 10px;
    margin: 5px;
    border-radius: 6px;
    border: none;
    font-size: 15px;
}

button {
    background: linear-gradient(45deg, #ff6a00, #ee0979);
    color: white;
    cursor: pointer;
}

/* Stage */
.stage {
    margin-top: 80px;
    position: relative;
}

/* Cake */
.cake {
    width: 220px;
    margin: auto;
}

.layer {
    height: 50px;
    border-radius: 10px;
}

.layer1 { background: #ff9a9e; }
.layer2 { background: #fad0c4; margin-top: -8px; }
.layer3 { background: #fbc2eb; margin-top: -8px; }

/* Candle */
.candle {
    width: 10px;
    height: 45px;
    background: #fff;
    position: absolute;
    top: -45px;
    border-radius: 2px;
}

/* Flame */
.flame {
    width: 12px;
    height: 18px;
    background: radial-gradient(circle, yellow, orange, red);
    border-radius: 50%;
    position: absolute;
    top: -18px;
    animation: flicker 0.2s infinite ease-in-out;
}

@keyframes flicker {
    0%,100% { transform: scale(1); }
    50% { transform: scale(1.25); }
}

/* Blow effect */
.blow {
    animation: fadeOut 0.6s forwards;
}

@keyframes fadeOut {
    to { opacity: 0; transform: scale(0.5); }
}

/* Message */
.msg {
    margin-top: 30px;
    font-size: 28px;
    display: none;
    opacity: 0;
    transition: 0.8s;
}

.msg.show {
    display: block;
    opacity: 1;
}
</style>
</head>

<body>

<h1>🎂 Blow the Candle</h1>

<div class="controls">
    <input type="text" id="name" placeholder="Enter Name">
    
    <select id="mode">
        <option value="candle">Only Candles</option>
        <option value="cake">Cake + Candles</option>
    </select>

    <button onclick="start()">Start</button>
</div>

<div class="stage" id="stage"></div>

<div class="msg" id="msg"></div>

<script>
let blown = false;

function start() {
    const name = document.getElementById("name").value.trim();
    const mode = document.getElementById("mode").value;

    if(name === ""){
        alert("Name enter karo");
        return;
    }

    document.querySelector(".controls").style.display = "none";

    const stage = document.getElementById("stage");
    stage.innerHTML = "";

    let base;

    if(mode === "cake"){
        base = document.createElement("div");
        base.className = "cake";
        base.innerHTML = `
            <div class="layer layer1"></div>
            <div class="layer layer2"></div>
            <div class="layer layer3"></div>
        `;
        stage.appendChild(base);
    } else {
        base = stage;
    }

    createCandles(base);

    document.getElementById("msg").innerText = "Happy Birthday " + name + " 🎉";

    startMic();
}

function createCandles(parent) {
    const count = 5;

    for (let i = 0; i < count; i++) {
        let c = document.createElement("div");
        c.className = "candle";
        c.style.left = (50 + i * 30) + "px";

        let f = document.createElement("div");
        f.className = "flame";

        c.appendChild(f);
        parent.appendChild(c);
    }
}

function startMic() {
navigator.mediaDevices.getUserMedia({ audio: true })
.then(stream => {

    const ctx = new AudioContext();
    const mic = ctx.createMediaStreamSource(stream);
    const analyser = ctx.createAnalyser();

    mic.connect(analyser);
    analyser.fftSize = 256;

    const data = new Uint8Array(analyser.frequencyBinCount);

    function detect() {
        analyser.getByteFrequencyData(data);

        let vol = data.reduce((a,b)=>a+b)/data.length;

        if(vol > 70 && !blown){
            blown = true;
            blowOut();
        }

        requestAnimationFrame(detect);
    }

    detect();
})
.catch(() => alert("Mic allow karo"));
}

function blowOut() {
    document.querySelectorAll(".flame").forEach(f => {
        f.classList.add("blow");
    });

    setTimeout(() => {
        document.getElementById("msg").classList.add("show");
    }, 400);
}
</script>

</body>
</html>
