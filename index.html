<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>Birthday Ultimate 🎂</title>

<style>
body {
  margin: 0;
  background: radial-gradient(circle at bottom, #0f2027, #203a43, #000);
  font-family: 'Segoe UI', sans-serif;
  text-align: center;
  color: white;
}

/* Heading */
h1 {
  margin-top: 40px;
  font-weight: 300;
}

/* Input */
.input-box {
  margin-top: 30px;
}
input, select, button {
  padding: 10px;
  border-radius: 6px;
  border: none;
  margin: 5px;
}
button {
  background: #ff7e5f;
  color: white;
  cursor: pointer;
}

/* Scene */
#scene {
  margin-top: 100px;
  position: relative;
}

/* ===== 🎂 CAKE ===== */
.cake {
  position: relative;
  width: 260px;
  margin: auto;
}

.top {
  height: 30px;
  background: #fff;
  border-radius: 50%;
  margin-bottom: -15px;
  box-shadow: inset 0 4px 8px rgba(0,0,0,0.2);
}

.layer {
  height: 55px;
  border-radius: 12px;
  background: linear-gradient(to bottom, #fff, #eee);
  margin-top: -12px;
  box-shadow: 
    inset 0 5px 10px rgba(255,255,255,0.8),
    0 10px 25px rgba(0,0,0,0.5);
}

/* ===== 🕯️ CANDLE COMMON ===== */
.candle-wrapper {
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
}

.candle {
  width: 18px;
  height: 140px;
  border-radius: 10px;
  background: linear-gradient(#f5f5f5, #ddd);
  box-shadow: inset 0 0 10px rgba(0,0,0,0.2);
  position: relative;
}

/* Only candle mode base glow */
.floor-glow {
  position: absolute;
  bottom: -20px;
  left: 50%;
  transform: translateX(-50%);
  width: 120px;
  height: 30px;
  background: radial-gradient(circle, rgba(255,200,100,0.3), transparent);
  border-radius: 50%;
}

/* Wick */
#knot {
  position: absolute;
  bottom: 100%;
  left: 50%;
  width: 3px;
  height: 12px;
  background: #222;
  transform: translateX(-50%);
}

/* Flame */
.flame {
  position: absolute;
  bottom: 112%;
  left: 50%;
  width: 18px;
  height: 30px;
  transform: translateX(-50%);
  background: radial-gradient(ellipse, #fff, #ffd700, #ff8c00);
  border-radius: 50%;
  animation: flicker 0.15s infinite alternate;
  box-shadow: 0 0 30px orange;
}

@keyframes flicker {
  from { transform: translateX(-50%) scale(1); }
  to { transform: translateX(-48%) scale(1.15); }
}

/* Glow */
.glow {
  position: absolute;
  bottom: 120%;
  left: 50%;
  width: 30px;
  height: 30px;
  transform: translateX(-50%);
  border-radius: 50%;
  box-shadow: 0 0 80px 40px rgba(255,200,100,0.25);
  animation: glow 2s infinite;
}

@keyframes glow {
  0%,100% { opacity: 0.6; }
  50% { opacity: 1; }
}

/* Smoke */
.smoke {
  position: absolute;
  width: 8px;
  height: 8px;
  background: gray;
  border-radius: 50%;
  opacity: 0;
}
.smoke.active {
  animation: smokeUp 2s forwards;
}
@keyframes smokeUp {
  to { transform: translateY(-100px) scale(2.5); opacity: 0; }
}

/* Message */
.message {
  display: none;
  margin-top: 20px;
  font-size: 28px;
  color: gold;
}

/* Controls */
.controls {
  display: none;
  margin-top: 20px;
}

/* Confetti */
.confetti {
  position: fixed;
  width: 6px;
  height: 6px;
  top: 0;
  animation: fall linear forwards;
}
@keyframes fall {
  to { transform: translateY(100vh); }
}
</style>

</head>

<body>

<h1>🎂 Birthday Magic 🎉</h1>

<div class="input-box">
  <input type="text" id="name" placeholder="Enter Name">
  <select id="mode">
    <option value="cake">Cake + Candle</option>
    <option value="candle">Only Candle</option>
  </select>
  <button onclick="start()">Start</button>
</div>

<div id="scene"></div>

<div class="message" id="msg"></div>

<div class="controls" id="controls">
  <button onclick="stopMusic()">Stop Music ⏹️</button>
  <button onclick="location.reload()">Restart 🔁</button>
</div>

<audio id="song" src="https://cdn.pixabay.com/audio/2022/03/15/audio_7c7d1c8e9c.mp3"></audio>

<script>
let blown = false;

function start() {
  const name = document.getElementById("name").value.trim();
  const mode = document.getElementById("mode").value;

  if (!name) {
    alert("Enter name 😄");
    return;
  }

  document.querySelector(".input-box").style.display = "none";

  const scene = document.getElementById("scene");

  if (mode === "cake") {
    scene.innerHTML = `
      <div class="cake">
        <div class="top"></div>
        <div class="layer"></div>
        <div class="layer"></div>
        <div class="layer"></div>

        <div class="candle-wrapper" style="top:-70px;">
          <div class="candle" id="candle"></div>
        </div>
      </div>
    `;
  } else {
    scene.innerHTML = `
      <div class="candle-wrapper" style="top:0;">
        <div class="candle" id="candle"></div>
        <div class="floor-glow"></div>
      </div>
    `;
  }

  createFlame();

  document.getElementById("msg").innerText = "🎉 Happy Birthday " + name;

  startMic();
}

function createFlame() {
  const candle = document.getElementById("candle");

  candle.innerHTML = `
    <div id="knot"></div>
    <div class="flame"></div>
    <div class="glow"></div>
    <div class="smoke"></div>
    <div class="smoke"></div>
    <div class="smoke"></div>
  `;
}

function startMic() {
navigator.mediaDevices.getUserMedia({ audio: true })
.then(stream => {

  const ctx = new AudioContext();
  const mic = ctx.createMediaStreamSource(stream);
  const analyser = ctx.createAnalyser();

  mic.connect(analyser);
  analyser.fftSize = 256;

  const data = new Uint8Array(analyser.frequencyBinCount);

  function detect() {
    analyser.getByteFrequencyData(data);
    let vol = data.reduce((a,b)=>a+b)/data.length;

    if (vol > 60 && !blown) {
      blown = true;

      document.querySelector(".flame").style.display = "none";
      document.querySelector(".glow").style.display = "none";

      document.querySelectorAll(".smoke").forEach(s => s.classList.add("active"));

      document.getElementById("msg").style.display = "block";
      document.getElementById("controls").style.display = "block";

      document.getElementById("song").play();

      confetti();
    }

    requestAnimationFrame(detect);
  }

  detect();
})
.catch(()=>alert("Mic allow karo!"));
}

function confetti() {
  for (let i = 0; i < 120; i++) {
    let c = document.createElement("div");
    c.className = "confetti";
    c.style.left = Math.random()*100+"vw";
    c.style.background = ["#ff7675","#74b9ff","#55efc4","#ffeaa7"][Math.floor(Math.random()*4)];
    c.style.animationDuration = (Math.random()*3+2)+"s";
    document.body.appendChild(c);
  }
}

function stopMusic() {
  document.getElementById("song").pause();
}
</script>

</body>
</html>
